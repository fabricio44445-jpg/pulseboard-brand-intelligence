name: Collect brand mentions

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect and archive mentions
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TRACKED_BRANDS: ${{ vars.TRACKED_BRANDS }}
        run: python collector_job.py

      - name: Commit archive updates
        run: |
          if git diff --quiet -- data/mentions.json; then
            echo "No archive changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/mentions.json
          git commit -m "Update 30-day mention archive"
          git push
